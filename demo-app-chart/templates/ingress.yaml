apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-api-gateway
  namespace: {{ .Values.namespace }} # Ensure this isn't hardcoded to 'demo-app'
  annotations:
    # Optional: Adds a small artificial delay or rate limiting if you wanted to simulate gateway policies later
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # API Gateway Route: Directs /api traffic to the backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
      # Default Route: Directs all other traffic to the frontend UI
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80